<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">SocialNet</div>
        <div class="nav-links">
            <button id="homeBtn" class="nav-item">Home</button>
            <button id="searchBtn" class="nav-item">Search</button>
            <button id="notificationsBtn" class="nav-item">Notifications</button>
            <button id="addPostBtn" class="nav-item" style="display: none;">Post</button>
            <button id="loginBtn" class="nav-item">Sign In</button>
            <button id="signupBtn" class="nav-item">Sign Up</button>
            <button id="profileBtn" class="nav-item"><i class="fa-solid fa-user"></i></button>
            <button id="logoutBtn" class="nav-item" style="display: none;"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>
    </nav>

    <div id="content">
        <section id="homeSection" class="content-section" style="display: block;">
            <h3>Home</h3>
            <div id="postFeed"></div>
        </section>

    
        <section id="searchSection" class="content-section" style="display: none;">
            <h3>Search</h3>
            <input type="search" name="search" id="searchContent" oninput="toggleSearch(event)">
            <select id="typeSearch">
                <option value="user">User</option>
                <option value="content">Content</option>
            </select>
            <div id="search-results">
                <!-- Search results will be appended here dynamically -->
            </div>
        </section>
        

        <section id="loginSection" class="content-section" style="display: none;">
            <div class="auth-container">
                <h3>Login</h3>
                <form id="loginForm">
                    <input type="text" id="loginUsername" placeholder="Username" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
            </div>
        </section>

        <section id="signupSection" class="content-section" style="display: none;">
            <div class="auth-container">
                <h3>Sign Up</h3>
                <form id="signupForm">
                    <input type="text" id="signupName" placeholder="Name" required>
                    <input type="text" id="signupUsername" placeholder="Username" required>
                    <input type="email" id="signupEmail" placeholder="Email" required>
                    <input type="password" id="signupPassword" placeholder="Password" required>
                    <button type="submit">Sign Up</button>
                </form>
            </div>
        </section>

        <section id="profileSection" class="content-section" style="display: none;">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-info">
                        <div class="profile-info-header">
                            <h2 id="profile_username"></h2>
                        </div>
                        <div class="stats">
                            <div class="stat-item">
                                <span id="numberOfPosts">0</span> posts
                            </div>
                            <div class="stat-item">
                                <span id="numberOfFollowers">0</span> followers
                            </div>
                            <div class="stat-item">
                                <span id="numberOfFollowing">0</span> following
                            </div>
                        </div>
                        <div class="profile-bio">
                            <div class="full-name"></div>
                            <div class="bio-text"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="postContainer"> <!--posts will appear here -->></div>
    </section>
            

        <div id="notificationsSidebar" class="notifications-sidebar">
            <div class="notifications-content">
                <h3>Notifications</h3>
                <ul id="notificationsList">
                </ul>
            </div>
        </div>

        <div id="addPostPopup" class="popup" style="display: none;">
            <div class="popup-content">
                <span id="closePopup" class="close">&times;</span>
                <h2>Add a Post</h2>
                <form id="postForm">
                    <input type="file" id="image" accept="image/*">
                    <textarea id="caption" placeholder="Add a caption"></textarea>
                    <button type="submit">Post</button>
                </form>
            </div>
        </div>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
